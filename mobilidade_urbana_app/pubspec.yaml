name: mobilidade_urbana_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.0
  flutter_native_splash: ^2.4.7

  # State management & navigation (GetX unificado)
  get: ^4.7.3

  # Network
  dio: ^5.9.2

  # Storage
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  package_info_plus: ^8.3.0

  # Map
  flutter_map: ^8.2.2

  # UI
  flutter_svg: ^2.2.4
  smooth_page_indicator: ^2.0.1
  flutter_dotenv: ^6.0.0
  uuid: ^4.5.3
  lottie: ^3.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_background: "#D4FF73"
  adaptive_icon_foreground_padding: 16
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#D4FF73"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/images/bus.svg
    - assets/logos/